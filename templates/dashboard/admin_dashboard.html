{% extends "base.html" %}
{% block content %}

<div class="min-h-screen bg-gradient-to-r from-blue-600 to-blue-800 py-16">
<div class="max-w-6xl mx-auto px-6">
<h1 class="text-4xl font-bold text-white text-center mb-12">Admin Content Manager</h1>

<div class="grid md:grid-cols-2 gap-10">

<div class="bg-white rounded-xl shadow-2xl p-8">
<h2 class="text-2xl font-semibold mb-6 text-blue-700">Upload Course</h2>

<form method="POST" enctype="multipart/form-data" class="space-y-4">
{% csrf_token %}
<input type="text" name="title" placeholder="Course Title" class="w-full border p-3 rounded">
<input type="file" name="thumbnail" class="w-full border p-3 rounded">
<textarea name="content" rows="4" placeholder="Course Description" class="w-full border p-3 rounded"></textarea>
<input type="text" name="link" placeholder="Course Link" class="w-full border p-3 rounded">
<textarea name="metadata" rows="3" placeholder="Metadata" class="w-full border p-3 rounded"></textarea>
<button name="course_submit" class="w-full bg-blue-600 text-white p-3 rounded">Upload Course</button>
</form>
</div>

<div class="bg-white rounded-xl shadow-2xl p-8">
<h2 class="text-2xl font-semibold mb-6 text-green-700">Upload Article</h2>

<form method="POST" enctype="multipart/form-data" class="space-y-4">
{% csrf_token %}
<input type="text" name="title" placeholder="Article Title" class="w-full border p-3 rounded">
<input type="file" name="thumbnail" class="w-full border p-3 rounded">
<textarea name="content" rows="4" placeholder="Article Content" class="w-full border p-3 rounded"></textarea>
<input type="text" name="link" placeholder="Article Link" class="w-full border p-3 rounded">
<textarea name="metadata" rows="3" placeholder="Metadata" class="w-full border p-3 rounded"></textarea>
<button name="article_submit" class="w-full bg-green-600 text-white p-3 rounded">Upload Article</button>
</form>
</div>

</div>
</div>
</div>

{% endblock %}
