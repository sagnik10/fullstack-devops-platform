{% extends "base.html" %}
{% block content %}

<div class="container mt-5">

<h2 class="text-white text-center mb-4">Latest Articles</h2>

<div class="row">

{% for article in articles %}

<div class="col-md-4 mb-4">

<div class="card shadow">

<div class="card-body">

<h5 class="card-title">{{article.title}}</h5>

<p class="card-text">{{article.content|truncatewords:20}}</p>

<div class="d-flex gap-2">

<a href="/like/{{article.id}}/" class="btn btn-primary btn-sm">Like</a>

<a href="/favorite/{{article.id}}/" class="btn btn-success btn-sm">Favorite</a>

</div>

</div>

</div>

</div>

{% endfor %}

</div>

</div>

{% endblock %}
