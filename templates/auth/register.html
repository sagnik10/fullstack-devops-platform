{% extends 'base.html' %}

{% block content %}

<div class="flex justify-center items-center h-[80vh]">

<div class="bg-white p-10 rounded-xl shadow w-96">

<h2 class="text-2xl font-bold mb-6 text-center">
Register
</h2>

<form method="POST">

{% csrf_token %}

<input name="username" placeholder="Username" class="w-full border p-3 mb-4 rounded">

<input name="email" placeholder="Email" class="w-full border p-3 mb-4 rounded">

<input type="password" name="password" placeholder="Password" class="w-full border p-3 mb-4 rounded">

<button class="w-full bg-green-600 text-white p-3 rounded">
Register
</button>

</form>

</div>

</div>

{% endblock %}
