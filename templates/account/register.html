{% extends "base/layout.html" %}

{% block content %}

<style>

.signup-container{
max-width:420px;
margin:100px auto;
background:white;
padding:50px 45px;
border-radius:16px;
box-shadow:0 25px 60px rgba(0,0,0,.35);
}

.signup-title{
text-align:center;
font-size:32px;
font-weight:700;
margin-bottom:35px;
color:#0f172a;
}

.form-group{
margin-bottom:22px;
}

.form-group label{
display:block;
font-weight:600;
margin-bottom:6px;
color:#374151;
}

.signup-input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #d1d5db;
font-size:14px;
margin-top:6px;
}

.signup-input:focus{
outline:none;
border-color:#22c55e;
box-shadow:0 0 0 3px rgba(34,197,94,.15);
}

.signup-btn{
width:100%;
padding:12px;
background:#22c55e;
color:white;
border:none;
border-radius:8px;
font-weight:600;
cursor:pointer;
transition:.25s;
}

.signup-btn:hover{
background:#16a34a;
transform:translateY(-1px);
box-shadow:0 8px 18px rgba(34,197,94,.35);
}

.signup-footer{
margin-top:20px;
text-align:center;
font-size:14px;
color:#6b7280;
}

.signup-footer a{
color:#2563eb;
font-weight:600;
text-decoration:none;
}

.signup-footer a:hover{
text-decoration:underline;
}

</style>

<div class="signup-container">

<h1 class="signup-title">Create Account</h1>

<form method="POST">
{% csrf_token %}

<div class="form-group">
<label>Username</label>
<input type="text" name="username" class="signup-input" placeholder="Username" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" name="email" class="signup-input" placeholder="Email" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" name="password" class="signup-input" placeholder="Password" required>
</div>

<button class="signup-btn">Register</button>

<div class="signup-footer">
Already have an account?
<a href="/accounts/login/">Login</a>
</div>

</form>

</div>

{% endblock %}
